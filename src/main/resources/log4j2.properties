# Silence Spark's own log4j2 logging
rootLogger.level = ERROR
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p %c{1} - %m%n

# Keep Hudi commit messages visible
logger.hudi.name = org.apache.hudi.client.BaseHoodieWriteClient
logger.hudi.level = INFO

# Keep your code visible
logger.beacon.name = com.beacon
logger.beacon.level = DEBUG